services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.27.0
    container_name: kinly-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      # Optional: enable Claude-powered assistant understanding.
      # ANTHROPIC_API_KEY: "sk-ant-..."
      # AI_MODEL: "claude-haiku-4-5-20251001"
      TZ: UTC
    volumes:
      - ./pb_migrations:/pb/pb_migrations
      - ./pb_hooks:/pb/pb_hooks
      - pb_data:/pb/pb_data
    command:
      - serve
      - --http=0.0.0.0:8090

volumes:
  pb_data:
